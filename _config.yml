title: Asgard API Documentation
description: Official API reference for Asgard integration partners
url: https://vanguarder-ltd.github.io
baseurl: /asgard-api-docs

# Custom accent colour
accent_color: "#00b4d8"

remote_theme: just-the-docs/just-the-docs@v0.10.0

favicon_ico: "/favicon.ico"

# Navigation
nav_enabled: true
search_enabled: true

# Footer
footer_content: "&copy; 2026 Vanguarder Ltd. All rights reserved."

# Colour scheme
color_scheme: dark

# Back to top
back_to_top: true
back_to_top_text: "Back to top"

# Last edit timestamp
last_edit_timestamp: true
last_edit_time_format: "%d %B %Y"

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
